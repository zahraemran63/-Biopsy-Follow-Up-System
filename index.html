    const cards =
        document.querySelectorAll('.card');

    cards.forEach(card => {

            card.innerText.toLowerCase();

        const date =
            (card.dataset.date || '')
            .toLowerCase();

        card.style.display =
            text.includes(keyword) ||
            date.includes(keyword)

 async function checkOverduePatients(){

const { data } = await client
    .from('patients')
    .select('*')
    .eq('completed', false)
    .eq('needs_followup', true);

    const today = new Date();

    const overduePatients =
        data.filter(patient => {

            if(!patient.last_update)
                return false;

            const updateDate =
                new Date(patient.last_update);

            const diffDays =
                Math.floor(
                    (today - updateDate)
                    /
                    (1000 * 60 * 60 * 24)
                );

            return diffDays >= 1;
        });

    const alertBox =
        document.getElementById(
            'overdueAlert'
        );

    if(overduePatients.length > 0){

        alertBox.style.display =
            'block';

        alertBox.innerHTML =
            `⚠️ ${overduePatients.length} patient(s) require update`;
    }
    else{

        alertBox.style.display =
            'none';
    }

}

    const { error } = await client
        .from('patients')
        .update({
            completed: true,
            needs_followup: false
        })
        .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    await showAllPatients();
    await refreshCounts();
 await checkOverduePatients();
    return;
}
    if(!needsFollowup){

        const { error } = await client
            .from('patients')
.update({
    needs_followup: true
})
            .eq('id', id);

        if(error){
            alert(error.message);
            return;
        }

    } else {

        const { error } = await client
            .from('patients')
.update({
    needs_followup: false,
    original_diagnosis: null
})
            .eq('id', id);

        if(error){
            alert(error.message);
            return;
        }

    }

   
await showAllPatients();
await refreshCounts();
     await checkOverduePatients();
     
}
    

async function exportExcel(){

    const btn =
        document.getElementById('exportBtn');

    btn.disabled = true;
    btn.innerHTML = '⏳ Exporting...';

    try{

        const workbook =
            new ExcelJS.Workbook();

        workbook.creator =
            'Biopsy Follow Up System';

        workbook.created =
            new Date();

        const { data: allPatients } =
            await client
                .from('patients')
                .select('*');

        const { data: followUpPatients } =
            await client
                .from('patients')
                .select('*')
                .eq('needs_followup', true)
                .eq('completed', false);

        const { data: completedPatients } =
            await client
                .from('patients')
                .select('*')
                .eq('completed', true);

        const normalPatients =
            allPatients.filter(
                p => !p.completed
            );

        /* ==========================
           SUMMARY SHEET
        ========================== */

        const summarySheet =
            workbook.addWorksheet(
                'Summary'
            );

        summarySheet.columns = [
            {
                header:'Category',
                key:'category',
                width:40
            },
            {
                header:'Patients',
                key:'count',
                width:20
            }
        ];

        const headerRow =
            summarySheet.getRow(1);

        headerRow.values = [
            'Category',
            'Patients'
        ];

        headerRow.eachCell(cell => {

            cell.font = {
                bold:true,
                color:{
                    argb:'FFFFFFFF'
                },
                size:12
            };

            cell.fill = {
                type:'pattern',
                pattern:'solid',
                fgColor:{
                    argb:'1F4E78'
                }
            };

            cell.border = {
                top:{style:'thin'},
                left:{style:'thin'},
                bottom:{style:'thin'},
                right:{style:'thin'}
            };

        });

        summarySheet.addRow({
            category:'All Patients',
            count:normalPatients.length
        });

        summarySheet.addRow({
            category:'Follow Up',
            count:followUpPatients.length
        });

        summarySheet.addRow({
            category:'Completed',
            count:completedPatients.length
        });

        summarySheet.addRow([]);

        const totalRow1 =
            summarySheet.addRow({
                category:'Total Patients',
                count:normalPatients.length
            });

        const totalRow2 =
            summarySheet.addRow({
                category:'Total Follow Up',
                count:followUpPatients.length
            });

        const totalRow3 =
            summarySheet.addRow({
                category:'Total Completed',
                count:completedPatients.length
            });

        [totalRow1,totalRow2,totalRow3]
            .forEach(row => {

            row.eachCell(cell => {

                cell.font = {
                    bold:true,
                    color:{
                        argb:'FFFFFFFF'
                    }
                };

                cell.fill = {
                    type:'pattern',
                    pattern:'solid',
                    fgColor:{
                        argb:'1F4E78'
                    }
                };

                cell.border = {
                    top:{style:'thin'},
                    left:{style:'thin'},
                    bottom:{style:'thin'},
                    right:{style:'thin'}
                };

            });

        });

        /* ==========================
           PATIENT SHEETS
        ========================== */

        function createSheet(
            sheetName,
            patients
        ){

            const sheet =
                workbook.addWorksheet(
                    sheetName
                );

            sheet.mergeCells('A1:F1');

            const titleCell =
                sheet.getCell('A1');

            titleCell.value =
                'BIOPSY FOLLOW UP SYSTEM';

            titleCell.font = {
                size:18,
                bold:true,
                color:{
                    argb:'FFFFFFFF'
                }
            };

            titleCell.alignment = {
                horizontal:'center'
            };

            titleCell.fill = {
                type:'pattern',
                pattern:'solid',
                fgColor:{
                    argb:'1F4E78'
                }
            };

            sheet.mergeCells('A2:F2');
            sheet.getCell('A2').value =
                `Category: ${sheetName}`;

            sheet.mergeCells('A3:F3');
            sheet.getCell('A3').value =
                `Total Patients: ${patients.length}`;

            sheet.mergeCells('A4:F4');
            sheet.getCell('A4').value =
                `Export Date: ${
                    new Date()
                    .toLocaleDateString()
                }`;

            sheet.columns = [

                {
                    header:'S.No',
                    key:'no',
                    width:10
                },

                {
                    header:'MRN',
                    key:'mrn',
                    width:20
                },

                {
                    header:'Name',
                    key:'name',
                    width:40
                },

                {
                    header:'Mobile',
                    key:'phone',
                    width:25
                },

                {
                    header:'Remark',
                    key:'remark',
                    width:50
                },

                {
                    header:'Last Update',
                    key:'update',
                    width:20
                }

            ];

            const header =
                sheet.getRow(6);

            header.values = [
                'S.No',
                'MRN',
                'Name',
                'Mobile',
                'Remark',
                'Last Update'
            ];

            header.eachCell(cell => {

                cell.font = {
                    bold:true,
                    color:{
                        argb:'FFFFFFFF'
                    }
                };

                cell.fill = {
                    type:'pattern',
                    pattern:'solid',
                    fgColor:{
                        argb:'4472C4'
                    }
                };

                cell.alignment = {
                    horizontal:'center'
                };

                cell.border = {
                    top:{style:'thin'},
                    left:{style:'thin'},
                    bottom:{style:'thin'},
                    right:{style:'thin'}
                };

            });

            patients.forEach(
                (patient,index) => {

                const row =
                    sheet.addRow({

                    no:index + 1,

                    mrn:
                        patient.file_no || '',

                    name:
                        patient.name || '',

                    phone:
                        patient.phone || '',

                    remark:
                        patient.remarks || '',

                    update:
                        patient.last_update || ''

                });

                row.eachCell(cell => {

                    cell.border = {
                        top:{style:'thin'},
                        left:{style:'thin'},
                        bottom:{style:'thin'},
                        right:{style:'thin'}
                    };

                });

                if(index % 2 === 0){

                    row.eachCell(cell => {

                        cell.fill = {
                            type:'pattern',
                            pattern:'solid',
                            fgColor:{
                                argb:'F3F6FA'
                            }
                        };

                    });

                }

            });

            sheet.views = [
                {
                    state:'frozen',
                    ySplit:6
                }
            ];

            sheet.autoFilter = {
                from:'A6',
                to:'F6'
            };

        }

        createSheet(
            'All Patients',
            normalPatients
        );

        createSheet(
            'Follow Up',
            followUpPatients
        );

        createSheet(
            'Completed',
            completedPatients
        );

        const buffer =
            await workbook.xlsx.writeBuffer();

        const blob =
            new Blob(
                [buffer],
                {
                    type:
                    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
                }
            );

        const link =
            document.createElement('a');

        const today =
            new Date()
            .toISOString()
            .split('T')[0];

        link.href =
            URL.createObjectURL(blob);

        link.download =
            `Biopsy_Report_${today}.xlsx`;

        link.click();

    }
    catch(error){

        alert(error.message);

    }
    finally{

        btn.disabled = false;
        btn.innerHTML =
            '📊 Export Excel';

    }

} 
    async function importExcel(event){
        if(typeof XLSX === 'undefined'){
    alert('XLSX Library Not Loaded');
    return;
}

    const btn =
        document.getElementById('importBtn');

    btn.disabled = true;
    btn.innerHTML = '⏳ Importing...';

    try {

        const file = event.target.files[0];

        if(!file){
            return;
        }

        const data =
            await file.arrayBuffer();

        const workbook =
            XLSX.read(data);

        for(const sheetName of workbook.SheetNames){

            const diagnosisName =
                sheetName.trim();

            const {
                data: existingDiagnosis
            } = await client
                .from('diagnoses')
                .select('id')
                .ilike('name', diagnosisName);

            if(
                !existingDiagnosis ||
                existingDiagnosis.length === 0
            ){

                await client
                    .from('diagnoses')
                    .insert({
                        name: diagnosisName
                    });
            }

            const sheet =
                workbook.Sheets[sheetName];

            const rows =
                XLSX.utils.sheet_to_json(
                    sheet,
                    { header:1 }
                );

            for(let i = 1; i < rows.length; i++){

                const row = rows[i];

                if(!row){
                    continue;
                }

                const fileNo =
                    row[1] || '';

                const name =
                    row[2] || '';

                const phone =
row[3] || '';

const remarks =
row[4] || '';

const lastUpdate =
row[5] || null;

                if(
                    !fileNo &&
                    !name &&
                    !remarks &&
                    !lastUpdate
                ){
                    continue;
                }

                await client
                    .from('patients')
.insert({
file_no:String(fileNo),
name:String(name),
phone:String(phone),
diagnosis:diagnosisName,
remarks:String(remarks),
last_update:lastUpdate || null

                    });

            }
        }

      

        await showAllPatients();

        alert(
            'Import completed successfully'
        );

    }
    catch(error){

        alert(error.message);

    }
    finally {

        btn.disabled = false;
        btn.innerHTML = 'Import Excel';

        document.getElementById(
            'excelFile'
        ).value = '';

    }
}

     <script>

function urlBase64ToUint8Array(base64String) {

    const padding =
        '='.repeat(
            (4 - base64String.length % 4) % 4
        );

    const base64 =
        (base64String + padding)
        .replace(/-/g, '+')
        .replace(/_/g, '/');

    const rawData =
        window.atob(base64);

    return Uint8Array.from(
        [...rawData].map(char =>
            char.charCodeAt(0)
        )
    );
}

async function subscribeToPush() {

    const permission =
        await Notification.requestPermission();

    if (permission !== 'granted') {
        return;
    }

    const registration =
        await navigator.serviceWorker.ready;

    const subscription =
        await registration.pushManager.subscribe({

            userVisibleOnly: true,

            applicationServerKey:
            urlBase64ToUint8Array(
                'BFaOFliXuWE8xXBYp-XDIa2xIox7ENOPS3Om5uZuWHGqIyrOudCG3fp1UE-a0dfS0ev20Ze_yXWklGfbxCk6l-E'
            )

        });

    console.log(subscription);

const result = await client
    .from('push_subscriptions')
    .insert({
        subscription: JSON.parse(
            JSON.stringify(subscription)
        )
    });

console.log('RESULT =>', result);
}

window.addEventListener(
    'load',
    subscribeToPush
);
</script>
